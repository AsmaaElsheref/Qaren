name: Flutter CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on:
    steps:
      - name: Checkout code
      - uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3

        with:
        distribution: 'temurin' # Use the Eclips Temurin distribution
        java-version: '11'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
        flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

#      - name: Run tests
#        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifact to Firebase App Distribution
        uses: w2ieba/Firebase-Distribution-Github-Action@v1
        with:
        appId: ${{secrets.APP_ID}}
        serviceCredentialFileContent: ${{secrets.GOOGLE_APPLICATION}}
        group: Testers
        path: build/app/outputs/flutter-apk/app-release.apk
